services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: cryptopairs-signal-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptopairs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopairs}
      POSTGRES_DB: ${POSTGRES_DB:-cryptopairs}
    ports:
      - "${SIGNAL_LAB_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cryptopairs} -d ${POSTGRES_DB:-cryptopairs}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - timescaledb-data-signal-lab:/var/lib/postgresql/data
      - ./infra/sql/init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql:ro

  redis:
    image: redis:7.4-alpine
    container_name: cryptopairs-signal-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${SIGNAL_LAB_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data-signal-lab:/data

  data-service:
    image: rust:1.93
    container_name: cryptopairs-signal-data-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p data-service --bin data-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      DATA_SERVICE_PORT: 8080
      KRAKEN_BASE_URL: ${KRAKEN_BASE_URL:-https://futures.kraken.com}
      KRAKEN_HISTORY_BOUNDS_PATH: ${KRAKEN_HISTORY_BOUNDS_PATH:-infra/config/kraken_history_bounds.json}
      KRAKEN_SYMBOLS: ${KRAKEN_SYMBOLS:-PF_XBTUSD,PF_ETHUSD,PF_SOLUSD,PF_XRPUSD,PF_ZECUSD,PF_DOGEUSD,PF_ADAUSD,PF_PEPEUSD,PF_SUIUSD,PF_AVAXUSD,PF_XAUTUSD,PF_TAOUSD,PF_LINKUSD,PF_BNBUSD,PF_HYPEUSD,PF_ARBUSD}
      DATA_INTEGRITY_THRESHOLD_PCT: ${DATA_INTEGRITY_THRESHOLD_PCT:-99.5}
      BACKFILL_INTERVAL_SECONDS: ${BACKFILL_INTERVAL_SECONDS:-60}
      BACKFILL_WINDOW_DAYS_1M: ${BACKFILL_WINDOW_DAYS_1M:-120}
      BACKFILL_WINDOW_DAYS_15M: ${BACKFILL_WINDOW_DAYS_15M:-540}
      BACKFILL_WINDOW_DAYS_1H: ${BACKFILL_WINDOW_DAYS_1H:-1095}
      CANDLES_RETENTION_DAYS_1M: ${CANDLES_RETENTION_DAYS_1M:-120}
      CANDLES_RETENTION_DAYS_15M: ${CANDLES_RETENTION_DAYS_15M:-540}
      CANDLES_RETENTION_DAYS_1H: ${CANDLES_RETENTION_DAYS_1H:-1095}
      CANDLES_PRUNE_INTERVAL_SECONDS: ${CANDLES_PRUNE_INTERVAL_SECONDS:-3600}
      BOOTSTRAP_START_TS: ${BOOTSTRAP_START_TS:-2020-02-26T00:00:00Z}
    ports:
      - "${SIGNAL_LAB_DATA_PORT:-18080}:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  account-service:
    image: rust:1.93
    container_name: cryptopairs-signal-account-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p account-service --bin account-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      ACCOUNT_SERVICE_PORT: 8081
      ACCOUNT_RECONCILE_INTERVAL_SECS: ${ACCOUNT_RECONCILE_INTERVAL_SECS:-60}
      ACCOUNT_RECONCILE_MAX_SNAPSHOT_AGE_SECS: ${ACCOUNT_RECONCILE_MAX_SNAPSHOT_AGE_SECS:-120}
      ACCOUNT_RECONCILE_MAX_DRIFT_NOTIONAL: ${ACCOUNT_RECONCILE_MAX_DRIFT_NOTIONAL:-25.0}
    ports:
      - "${SIGNAL_LAB_ACCOUNT_PORT:-18081}:8081"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  execution-service:
    image: rust:1.93
    container_name: cryptopairs-signal-execution-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p execution-service --bin execution-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      EXECUTION_SERVICE_PORT: 8082
      EXECUTION_DISPATCH_MODE: ${EXECUTION_DISPATCH_MODE:-simulate_ack}
      INTEGRITY_MIN_COVERAGE_PCT: ${INTEGRITY_MIN_COVERAGE_PCT:-99.5}
      EXECUTION_DATA_SERVICE_URL: ${EXECUTION_DATA_SERVICE_URL:-http://data-service:8080}
      EXECUTION_RISK_PER_PAIR_MAX_QTY: ${EXECUTION_RISK_PER_PAIR_MAX_QTY:-12}
      EXECUTION_RISK_GROSS_MAX_QTY: ${EXECUTION_RISK_GROSS_MAX_QTY:-40}
      EXECUTION_RISK_MAX_LEVERAGE: ${EXECUTION_RISK_MAX_LEVERAGE:-3.0}
      EXECUTION_RISK_DAILY_LOSS_LIMIT_USD: ${EXECUTION_RISK_DAILY_LOSS_LIMIT_USD:-500}
      EXECUTION_RISK_ENTRY_COOLDOWN_SECONDS: ${EXECUTION_RISK_ENTRY_COOLDOWN_SECONDS:-30}
      EXECUTION_RISK_MAX_SNAPSHOT_AGE_SECONDS: ${EXECUTION_RISK_MAX_SNAPSHOT_AGE_SECONDS:-120}
      EXECUTION_ACK_WATCHDOG_POLL_SECONDS: ${EXECUTION_ACK_WATCHDOG_POLL_SECONDS:-15}
      EXECUTION_ACK_EXPIRE_AFTER_SECONDS: ${EXECUTION_ACK_EXPIRE_AFTER_SECONDS:-90}
      EXECUTION_ACK_WATCHDOG_BATCH_LIMIT: ${EXECUTION_ACK_WATCHDOG_BATCH_LIMIT:-200}
      EXECUTION_OPENORDERS_POLLER_ENABLED: ${EXECUTION_OPENORDERS_POLLER_ENABLED:-false}
      EXECUTION_OPENORDERS_POLL_SECONDS: ${EXECUTION_OPENORDERS_POLL_SECONDS:-5}
      EXECUTION_OPENORDERS_POLL_BATCH_LIMIT: ${EXECUTION_OPENORDERS_POLL_BATCH_LIMIT:-200}
      EXECUTION_ORDER_STATUS_LOOKUP_ENABLED: ${EXECUTION_ORDER_STATUS_LOOKUP_ENABLED:-false}
      EXECUTION_TRIGGER_RECONCILE_ON_TERMINAL: ${EXECUTION_TRIGGER_RECONCILE_ON_TERMINAL:-true}
    ports:
      - "${SIGNAL_LAB_EXECUTION_PORT:-18082}:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  strategy-service:
    image: rust:1.93
    container_name: cryptopairs-signal-strategy-service
    profiles: ["app"]
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "set -e; source /usr/local/cargo/env; if ! command -v docker >/dev/null 2>&1; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose; fi; cargo run -p strategy-service --bin strategy-service",
      ]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      STRATEGY_SERVICE_PORT: 8083
      STRATEGY_DATA_SERVICE_URL: ${STRATEGY_DATA_SERVICE_URL:-http://data-service:8080}
      STRATEGY_PAIRS: ${STRATEGY_PAIRS:-PF_XBTUSD:PF_ETHUSD,PF_XBTUSD:PF_SOLUSD,PF_XBTUSD:PF_XRPUSD,PF_XBTUSD:PF_ADAUSD,PF_XBTUSD:PF_DOGEUSD,PF_XBTUSD:PF_AVAXUSD,PF_XBTUSD:PF_BNBUSD,PF_XBTUSD:PF_LINKUSD,PF_ETHUSD:PF_SOLUSD,PF_ETHUSD:PF_XRPUSD,PF_ETHUSD:PF_ADAUSD,PF_SOLUSD:PF_AVAXUSD,PF_XRPUSD:PF_ADAUSD,PF_DOGEUSD:PF_PEPEUSD,PF_SUIUSD:PF_ARBUSD,PF_TAOUSD:PF_HYPEUSD}
      STRATEGY_TIMEFRAMES: ${STRATEGY_TIMEFRAMES:-1m,15m,1h}
      STRATEGY_ENTRY_BAND: ${STRATEGY_ENTRY_BAND:-1.8}
      STRATEGY_EXIT_BAND: ${STRATEGY_EXIT_BAND:-0.6}
      STRATEGY_STOP_BAND: ${STRATEGY_STOP_BAND:-3.2}
      STRATEGY_LOOKBACK_BARS_1M: ${STRATEGY_LOOKBACK_BARS_1M:-520}
      STRATEGY_LOOKBACK_BARS_15M: ${STRATEGY_LOOKBACK_BARS_15M:-720}
      STRATEGY_LOOKBACK_BARS_1H: ${STRATEGY_LOOKBACK_BARS_1H:-900}
      STRATEGY_PAPER_TRADE_PERSIST_BARS: ${STRATEGY_PAPER_TRADE_PERSIST_BARS:-43200}
      STRATEGY_OPT_TRAIN_DAYS_1M: ${STRATEGY_OPT_TRAIN_DAYS_1M:-45}
      STRATEGY_OPT_TRAIN_DAYS_15M: ${STRATEGY_OPT_TRAIN_DAYS_15M:-270}
      STRATEGY_OPT_TRAIN_DAYS_1H: ${STRATEGY_OPT_TRAIN_DAYS_1H:-730}
      STRATEGY_OPT_VALIDATE_DAYS_1M: ${STRATEGY_OPT_VALIDATE_DAYS_1M:-21}
      STRATEGY_OPT_VALIDATE_DAYS_15M: ${STRATEGY_OPT_VALIDATE_DAYS_15M:-75}
      STRATEGY_OPT_VALIDATE_DAYS_1H: ${STRATEGY_OPT_VALIDATE_DAYS_1H:-180}
      STRATEGY_HOLD_BARS_1M: ${STRATEGY_HOLD_BARS_1M:-20}
      STRATEGY_HOLD_BARS_15M: ${STRATEGY_HOLD_BARS_15M:-14}
      STRATEGY_HOLD_BARS_1H: ${STRATEGY_HOLD_BARS_1H:-10}
      STRATEGY_MAX_HALF_LIFE_BARS_1M: ${STRATEGY_MAX_HALF_LIFE_BARS_1M:-120}
      STRATEGY_MAX_HALF_LIFE_BARS_15M: ${STRATEGY_MAX_HALF_LIFE_BARS_15M:-90}
      STRATEGY_MAX_HALF_LIFE_BARS_1H: ${STRATEGY_MAX_HALF_LIFE_BARS_1H:-72}
      STRATEGY_FUNDING_DRAG_BPS: ${STRATEGY_FUNDING_DRAG_BPS:-0.6}
      STRATEGY_DYNAMIC_FUNDING_ENABLED: ${STRATEGY_DYNAMIC_FUNDING_ENABLED:-true}
      STRATEGY_FUNDING_INTERVAL_SECS: ${STRATEGY_FUNDING_INTERVAL_SECS:-3600}
      STRATEGY_FUNDING_PHASE_OFFSET_SECS: ${STRATEGY_FUNDING_PHASE_OFFSET_SECS:-0}
      STRATEGY_FUNDING_RATE_BPS_MULTIPLIER: ${STRATEGY_FUNDING_RATE_BPS_MULTIPLIER:-10000}
      STRATEGY_FUNDING_POSITIVE_RATE_MEANS_LONGS_PAY: ${STRATEGY_FUNDING_POSITIVE_RATE_MEANS_LONGS_PAY:-true}
      STRATEGY_FUNDING_RATE_INPUT_MODE: ${STRATEGY_FUNDING_RATE_INPUT_MODE:-percent}
      STRATEGY_MIN_SAMPLES_TARGET: ${STRATEGY_MIN_SAMPLES_TARGET:-8}
      STRATEGY_REOPT_INTERVAL_SECS: ${STRATEGY_REOPT_INTERVAL_SECS:-3600}
      STRATEGY_SHADOW_ML_MIN_ROWS: ${STRATEGY_SHADOW_ML_MIN_ROWS:-64}
      STRATEGY_SHADOW_ML_TRAINING_LIMIT: ${STRATEGY_SHADOW_ML_TRAINING_LIMIT:-1200}
      STRATEGY_TRADING_FEE_BPS: ${STRATEGY_TRADING_FEE_BPS:-1.2}
      STRATEGY_SLIPPAGE_BASE_BPS: ${STRATEGY_SLIPPAGE_BASE_BPS:-0.8}
      STRATEGY_SLIPPAGE_VOL_MULTIPLIER: ${STRATEGY_SLIPPAGE_VOL_MULTIPLIER:-0.45}
      STRATEGY_SLIPPAGE_Z_MULTIPLIER: ${STRATEGY_SLIPPAGE_Z_MULTIPLIER:-0.2}
      STRATEGY_SAMPLED_SLIPPAGE_INTERVAL_MS: ${STRATEGY_SAMPLED_SLIPPAGE_INTERVAL_MS:-1000}
      STRATEGY_SAMPLED_SLIPPAGE_WARMUP_SECS: ${STRATEGY_SAMPLED_SLIPPAGE_WARMUP_SECS:-300}
      STRATEGY_SAMPLED_SLIPPAGE_STALE_SECS: ${STRATEGY_SAMPLED_SLIPPAGE_STALE_SECS:-20}
      STRATEGY_SAMPLED_SLIPPAGE_EWMA_ALPHA: ${STRATEGY_SAMPLED_SLIPPAGE_EWMA_ALPHA:-0.2}
      STRATEGY_SAMPLED_SLIPPAGE_STATE_PATH: ${STRATEGY_SAMPLED_SLIPPAGE_STATE_PATH:-artifacts/runtime/sampled_slippage_state.signal-lab.json}
      STRATEGY_SAMPLED_SLIPPAGE_PERSIST_SECS: ${STRATEGY_SAMPLED_SLIPPAGE_PERSIST_SECS:-5}
      STRATEGY_SAMPLED_SLIPPAGE_BOOTSTRAP_MAX_DEVIATION_BPS: ${STRATEGY_SAMPLED_SLIPPAGE_BOOTSTRAP_MAX_DEVIATION_BPS:-3.0}
      STRATEGY_MIN_NET_EDGE_BPS: ${STRATEGY_MIN_NET_EDGE_BPS:-0.0}
      STRATEGY_ADVISORY_GROSS_CAP: ${STRATEGY_ADVISORY_GROSS_CAP:-1.0}
      STRATEGY_ADVISORY_PER_PAIR_CAP: ${STRATEGY_ADVISORY_PER_PAIR_CAP:-0.35}
      STRATEGY_ADVISORY_ENABLED: ${STRATEGY_ADVISORY_ENABLED:-true}
      STRATEGY_RESEARCH_SWEEP_EXECUTION_CAP: ${STRATEGY_RESEARCH_SWEEP_EXECUTION_CAP:-20000}
      STRATEGY_RESEARCH_SWEEP_TOP_K: ${STRATEGY_RESEARCH_SWEEP_TOP_K:-10}
      STRATEGY_WF_FOLDS: ${STRATEGY_WF_FOLDS:-4}
      STRATEGY_WF_MIN_TRADES_PER_FOLD: ${STRATEGY_WF_MIN_TRADES_PER_FOLD:-1}
      STRATEGY_CANDIDATE_PROBATION_DAYS_1M: ${STRATEGY_CANDIDATE_PROBATION_DAYS_1M:-3}
      STRATEGY_CANDIDATE_PROBATION_DAYS_15M: ${STRATEGY_CANDIDATE_PROBATION_DAYS_15M:-7}
      STRATEGY_CANDIDATE_PROBATION_DAYS_1H: ${STRATEGY_CANDIDATE_PROBATION_DAYS_1H:-14}
      STRATEGY_CANDIDATE_PROBATION_MIN_SAMPLES: ${STRATEGY_CANDIDATE_PROBATION_MIN_SAMPLES:-12}
      STRATEGY_CANDIDATE_PROBATION_MAX_SAMPLES: ${STRATEGY_CANDIDATE_PROBATION_MAX_SAMPLES:-336}
      STRATEGY_CANDIDATE_PROMOTION_MIN_OBJECTIVE_DELTA: ${STRATEGY_CANDIDATE_PROMOTION_MIN_OBJECTIVE_DELTA:-0.25}
      STRATEGY_CANDIDATE_INBOX_DEFAULT_LIMIT: ${STRATEGY_CANDIDATE_INBOX_DEFAULT_LIMIT:-3}
      STRATEGY_UI_ACCESS_PASSWORD: ${STRATEGY_UI_ACCESS_PASSWORD:-}
      STRATEGY_MAINTENANCE_REPORT_PATH: ${STRATEGY_MAINTENANCE_REPORT_PATH:-artifacts/strategy_tuning/signal-lab/latest_maintenance_report.json}
      STRATEGY_MAINTENANCE_ARTIFACT_ROOT: ${STRATEGY_MAINTENANCE_ARTIFACT_ROOT:-artifacts/strategy_tuning/signal-lab}
    ports:
      - "${SIGNAL_LAB_STRATEGY_PORT:-18083}:8083"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  timescaledb-data-signal-lab:
  redis-data-signal-lab:

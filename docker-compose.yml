services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: cryptopairs-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptopairs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopairs}
      POSTGRES_DB: ${POSTGRES_DB:-cryptopairs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cryptopairs} -d ${POSTGRES_DB:-cryptopairs}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/sql/init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql:ro

  redis:
    image: redis:7.4-alpine
    container_name: cryptopairs-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  data-service:
    image: rust:1.93
    container_name: cryptopairs-data-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p data-service --bin data-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      DATA_SERVICE_PORT: 8080
      KRAKEN_BASE_URL: ${KRAKEN_BASE_URL:-https://futures.kraken.com}
      KRAKEN_HISTORY_BOUNDS_PATH: ${KRAKEN_HISTORY_BOUNDS_PATH:-infra/config/kraken_history_bounds.json}
      KRAKEN_SYMBOLS: ${KRAKEN_SYMBOLS:-PF_XBTUSD,PF_ETHUSD,PF_SOLUSD,PF_XRPUSD,PF_ZECUSD,PF_DOGEUSD,PF_ADAUSD,PF_PEPEUSD,PF_SUIUSD,PF_AVAXUSD,PF_XAUTUSD,PF_TAOUSD,PF_LINKUSD,PF_BNBUSD,PF_HYPEUSD,PF_ARBUSD}
      DATA_INTEGRITY_THRESHOLD_PCT: ${DATA_INTEGRITY_THRESHOLD_PCT:-99.5}
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  account-service:
    image: rust:1.93
    container_name: cryptopairs-account-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p account-service --bin account-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      ACCOUNT_SERVICE_PORT: 8081
      ACCOUNT_RECONCILE_INTERVAL_SECS: ${ACCOUNT_RECONCILE_INTERVAL_SECS:-60}
      ACCOUNT_RECONCILE_MAX_SNAPSHOT_AGE_SECS: ${ACCOUNT_RECONCILE_MAX_SNAPSHOT_AGE_SECS:-120}
      ACCOUNT_RECONCILE_MAX_DRIFT_NOTIONAL: ${ACCOUNT_RECONCILE_MAX_DRIFT_NOTIONAL:-25.0}
    ports:
      - "8081:8081"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  execution-service:
    image: rust:1.93
    container_name: cryptopairs-execution-service
    profiles: ["app"]
    working_dir: /workspace
    command: ["bash", "-lc", "source /usr/local/cargo/env && cargo run -p execution-service --bin execution-service"]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      EXECUTION_SERVICE_PORT: 8082
      INTEGRITY_MIN_COVERAGE_PCT: ${INTEGRITY_MIN_COVERAGE_PCT:-99.5}
      EXECUTION_RISK_PER_PAIR_MAX_QTY: ${EXECUTION_RISK_PER_PAIR_MAX_QTY:-12}
      EXECUTION_RISK_GROSS_MAX_QTY: ${EXECUTION_RISK_GROSS_MAX_QTY:-40}
      EXECUTION_RISK_MAX_LEVERAGE: ${EXECUTION_RISK_MAX_LEVERAGE:-3.0}
      EXECUTION_RISK_DAILY_LOSS_LIMIT_USD: ${EXECUTION_RISK_DAILY_LOSS_LIMIT_USD:-500}
      EXECUTION_RISK_ENTRY_COOLDOWN_SECONDS: ${EXECUTION_RISK_ENTRY_COOLDOWN_SECONDS:-30}
      EXECUTION_RISK_MAX_SNAPSHOT_AGE_SECONDS: ${EXECUTION_RISK_MAX_SNAPSHOT_AGE_SECONDS:-120}
    ports:
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace

  strategy-service:
    image: rust:1.93
    container_name: cryptopairs-strategy-service
    profiles: ["app"]
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "set -e; source /usr/local/cargo/env; if ! command -v docker >/dev/null 2>&1; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose; fi; cargo run -p strategy-service --bin strategy-service",
      ]
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-cryptopairs}:${POSTGRES_PASSWORD:-cryptopairs}@timescaledb:5432/${POSTGRES_DB:-cryptopairs}
      STRATEGY_SERVICE_PORT: 8083
      STRATEGY_DATA_SERVICE_URL: ${STRATEGY_DATA_SERVICE_URL:-http://data-service:8080}
      STRATEGY_PAIRS: ${STRATEGY_PAIRS:-PF_XBTUSD:PF_ETHUSD,PF_XBTUSD:PF_SOLUSD,PF_XBTUSD:PF_XRPUSD,PF_XBTUSD:PF_ADAUSD,PF_XBTUSD:PF_DOGEUSD,PF_XBTUSD:PF_AVAXUSD,PF_XBTUSD:PF_BNBUSD,PF_XBTUSD:PF_LINKUSD,PF_ETHUSD:PF_SOLUSD,PF_ETHUSD:PF_XRPUSD,PF_ETHUSD:PF_ADAUSD,PF_SOLUSD:PF_AVAXUSD,PF_XRPUSD:PF_ADAUSD,PF_DOGEUSD:PF_PEPEUSD,PF_SUIUSD:PF_ARBUSD,PF_TAOUSD:PF_HYPEUSD}
      STRATEGY_TIMEFRAMES: ${STRATEGY_TIMEFRAMES:-1m,15m,1h}
      STRATEGY_ENTRY_BAND: ${STRATEGY_ENTRY_BAND:-1.8}
      STRATEGY_EXIT_BAND: ${STRATEGY_EXIT_BAND:-0.6}
      STRATEGY_STOP_BAND: ${STRATEGY_STOP_BAND:-3.2}
      STRATEGY_REOPT_INTERVAL_SECS: ${STRATEGY_REOPT_INTERVAL_SECS:-3600}
      STRATEGY_SHADOW_ML_MIN_ROWS: ${STRATEGY_SHADOW_ML_MIN_ROWS:-64}
      STRATEGY_SHADOW_ML_TRAINING_LIMIT: ${STRATEGY_SHADOW_ML_TRAINING_LIMIT:-1200}
      STRATEGY_TRADING_FEE_BPS: ${STRATEGY_TRADING_FEE_BPS:-1.2}
      STRATEGY_SLIPPAGE_BASE_BPS: ${STRATEGY_SLIPPAGE_BASE_BPS:-0.8}
      STRATEGY_SLIPPAGE_VOL_MULTIPLIER: ${STRATEGY_SLIPPAGE_VOL_MULTIPLIER:-0.45}
      STRATEGY_SLIPPAGE_Z_MULTIPLIER: ${STRATEGY_SLIPPAGE_Z_MULTIPLIER:-0.2}
      STRATEGY_MIN_NET_EDGE_BPS: ${STRATEGY_MIN_NET_EDGE_BPS:-0.0}
      STRATEGY_ADVISORY_GROSS_CAP: ${STRATEGY_ADVISORY_GROSS_CAP:-1.0}
      STRATEGY_ADVISORY_PER_PAIR_CAP: ${STRATEGY_ADVISORY_PER_PAIR_CAP:-0.35}
      STRATEGY_ADVISORY_ENABLED: ${STRATEGY_ADVISORY_ENABLED:-true}
      STRATEGY_UI_ACCESS_PASSWORD: ${STRATEGY_UI_ACCESS_PASSWORD:-}
      STRATEGY_CHAMPION_SWITCH_MIN_DELTA: ${STRATEGY_CHAMPION_SWITCH_MIN_DELTA:-0.25}
      STRATEGY_BLOCK_ON_CHAMPION_DRIFT: ${STRATEGY_BLOCK_ON_CHAMPION_DRIFT:-true}
      STRATEGY_MAINTENANCE_REPORT_PATH: ${STRATEGY_MAINTENANCE_REPORT_PATH:-artifacts/strategy_tuning/latest_maintenance_report.json}
      STRATEGY_MAINTENANCE_ARTIFACT_ROOT: ${STRATEGY_MAINTENANCE_ARTIFACT_ROOT:-artifacts/strategy_tuning}
    ports:
      - "8083:8083"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  timescaledb-data:
  redis-data:

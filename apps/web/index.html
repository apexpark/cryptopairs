<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoPairs Operator Console</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --ok: #166534;
        --warn: #b45309;
        --bad: #991b1b;
      }
      body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; }
      .grid { display: grid; gap: 16px; grid-template-columns: 1.1fr 1fr; }
      .panel { background: var(--panel); border-radius: 12px; padding: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      input, select, button { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
      button { cursor: pointer; }
      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .bad { color: var(--bad); }
      pre { background: #0f172a; color: #e2e8f0; padding: 10px; border-radius: 8px; overflow: auto; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Manual Trading Operator Console</h1>
    <div class="grid">
      <section class="panel">
        <h2>Safety Readiness</h2>
        <div class="row">
          <input id="instrument" value="PI_XBTUSD" placeholder="Instrument" />
          <select id="timeframe"><option>1m</option><option>15m</option><option>1h</option></select>
          <input id="exchange" value="kraken_futures" placeholder="Exchange" />
          <input id="account" value="primary" placeholder="Account" />
          <button id="refresh">Refresh Gates</button>
        </div>
        <p id="kill" class="warn">Kill switch: checking...</p>
        <p id="integrity" class="warn">Integrity gate: checking...</p>
        <p id="reconcile" class="warn">Reconcile gate: checking...</p>
      </section>

      <section class="panel">
        <h2>Manual Order Intent</h2>
        <div class="row">
          <select id="action"><option>ENTRY</option><option>EXIT</option><option>EMERGENCY_STOP_CLOSE</option></select>
          <select id="side"><option>BUY</option><option>SELL</option></select>
          <input id="qty" type="number" step="0.01" value="1" />
          <input id="operator" value="operator-kevin" placeholder="Operator ID" />
        </div>
        <div class="row">
          <label><input id="confirmed" type="checkbox" checked /> Operator confirmed</label>
          <button id="submit">Submit Intent</button>
        </div>
        <pre id="intentOut">No submission yet.</pre>
      </section>
    </div>

    <script>
      const baseExec = "http://127.0.0.1:8082";
      const baseAcct = "http://127.0.0.1:8081";

      const id = (x) => document.getElementById(x);
      const statusClass = (ok, warn = false) => ok ? "ok" : (warn ? "warn" : "bad");

      async function refreshGates() {
        const instrument = id("instrument").value.trim();
        const timeframe = id("timeframe").value;
        const exchange = id("exchange").value.trim();
        const account = id("account").value.trim();

        try {
          const ks = await fetch(`${baseExec}/v1/execution/kill-switch`).then(r => r.json());
          id("kill").className = statusClass(!ks.active);
          id("kill").textContent = `Kill switch: ${ks.active ? "ACTIVE" : "OFF"} (${ks.reason})`;

          const dec = await fetch(`${baseExec}/v1/execution/decision?instrument=${encodeURIComponent(instrument)}&timeframe=${timeframe}`).then(r => r.json());
          const integrityOk = dec.decision === "ALLOWED";
          id("integrity").className = statusClass(integrityOk);
          id("integrity").textContent = `Integrity gate: ${dec.decision}${dec.reason ? " - " + dec.reason : ""}`;

          const rec = await fetch(`${baseAcct}/v1/account/reconcile?exchange=${encodeURIComponent(exchange)}&account_id=${encodeURIComponent(account)}`).then(r => r.json());
          const recState = rec.reconcile?.status || "MISSING";
          const recOk = recState === "OK";
          id("reconcile").className = statusClass(recOk, recState === "MISSING");
          id("reconcile").textContent = `Reconcile gate: ${recState}${rec.reconcile?.notes ? " - " + rec.reconcile.notes : ""}`;
        } catch (error) {
          id("intentOut").textContent = `Refresh error: ${String(error)}`;
        }
      }

      async function submitIntent() {
        const payload = {
          idempotency_key: `manual-${Date.now()}`,
          exchange: id("exchange").value.trim(),
          account_id: id("account").value.trim(),
          instrument: id("instrument").value.trim(),
          timeframe: id("timeframe").value,
          action: id("action").value,
          side: id("side").value,
          qty: Number(id("qty").value),
          operator_confirmed: id("confirmed").checked,
          operator_id: id("operator").value.trim() || null,
          min_coverage_pct: 99.5
        };
        const response = await fetch(`${baseExec}/v1/execution/order-intent`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        id("intentOut").textContent = JSON.stringify(await response.json(), null, 2);
      }

      id("refresh").addEventListener("click", refreshGates);
      id("submit").addEventListener("click", submitIntent);
      refreshGates();
    </script>
  </body>
</html>

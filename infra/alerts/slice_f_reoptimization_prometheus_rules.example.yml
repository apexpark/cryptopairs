# Example only. This file is not deployed by this repository and is not proof
# that Slice F alerts are configured, routed, or actively inspected on a host.
# The operator must capture deployed alert rules, routes, dashboard/query paths,
# missing-data behavior, and active alert state in the Slice F evidence bundle.
groups:
  - name: cryptopairs.slice_f_reoptimization.example
    rules:
      - alert: CryptopairsReoptimizeStuckLease
        expr: sum(strategy_reoptimize_active_runs{status=~"LEASED|RUNNING|CANCEL_REQUESTED"}) > 0
        for: 10m
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization appears stuck active.
          action: Keep runner and scheduler disabled until status, lease, and heartbeat evidence agree.

      - alert: CryptopairsReoptimizeFailedOrDegraded
        expr: increase(strategy_reoptimize_run_total{status=~"FAILED|DEGRADED|EXPIRED|CANCELED"}[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization reached a non-success terminal state.
          action: Keep recommendations at HOLD or OPERATOR_REVIEW_REQUIRED.

      - alert: CryptopairsReoptimizeScheduleMissed
        expr: increase(strategy_reoptimize_fail_closed_total{reason="SCHEDULE_MISSED"}[15m]) > 0 or increase(strategy_reoptimize_scheduler_enqueue_total{result=~"HEALTH_UNAVAILABLE|INTEGRITY_UNKNOWN|BUDGET_INVALID|LEASE_UNAVAILABLE|UNKNOWN_STATUS|CONFIG_INVALID"}[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Scheduled async reoptimization did not enqueue safely.
          action: Treat as blocked unless scheduler enablement was explicitly approved and evidence is complete.

      - alert: CryptopairsReoptimizeBudgetExhaustion
        expr: increase(strategy_reoptimize_budget_exhausted_total[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization budget exhausted.
          action: Keep recommendations fail-closed and review budgets/load.

      - alert: CryptopairsReoptimizeCancellationFailure
        expr: increase(strategy_reoptimize_cancel_total{result=~"FAILED|TIMED_OUT"}[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization cancellation failed or timed out.
          action: Preserve audit evidence; cancellation must not become SUCCEEDED.

      - alert: CryptopairsReoptimizeMissingTelemetry
        expr: increase(strategy_reoptimize_telemetry_missing_total[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization telemetry is missing or stale.
          action: Restore telemetry before any canary review.

      - alert: CryptopairsReoptimizeUnknownStatus
        expr: increase(strategy_reoptimize_status_unknown_total[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Async reoptimization status is unknown.
          action: Keep runner disabled and recommendation blocked.

      - alert: CryptopairsReoptimizeUnsafePromotionAttempt
        expr: increase(strategy_reoptimize_fail_closed_total{reason="UNSAFE_PROMOTION_ATTEMPT"}[15m]) > 0
        labels:
          severity: P1
          slice: slice_f
        annotations:
          summary: Unsafe async reoptimization promotion attempt observed.
          action: Confirm no automatic PROMOTE path executed and preserve logs.

      - alert: CryptopairsReoptimizeRepairProvenanceActive
        expr: increase(strategy_reoptimize_fail_closed_total{reason="REPAIR_PROVENANCE_ACTIVE"}[15m]) > 0
        labels:
          severity: P2
          slice: slice_f
        annotations:
          summary: Repair-only selected-signal provenance is active.
          action: Prove RECANONICALIZED_LEGACY_ROW remains blocked from trade eligibility.

name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "claude/**"

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.16.1-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo format
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        env:
          STRATEGY_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          CI: "true"
        run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint/test tools
        run: python -m pip install --upgrade pip ruff pytest

      - name: Ruff
        run: ruff check research

      - name: Pytest
        env:
          PYTHONPATH: research/strategy-engine/src
        run: pytest research/strategy-engine/tests -q

  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -euo pipefail
          for file in specs/contracts/*.json specs/examples/*.json; do
            python -m json.tool "$file" > /dev/null
          done
